<script type="sk-ts">
  interface Todo {
    id: number;
    text: string;
    done: boolean;
  }
  interface ServerTag {
    id: string;
    name: string;
  }
  const title = ref<string>(Sakura mix Vue SFC)
  const user = ref<string>(Sakura)
  const count = ref<number>(5)
  const todos = ref<Todo[]>(Dict{String, Any}[Dict("label" => "Setup Sakura-SFC ", "done" => true, "id" => 1), Dict("label" => "Enjoy Single File Dev ", "done" => false, "id" => 2)])
  const serverTags = ref<ServerTag[]>(["ssr", "hydration", "sfc"])
  const ready = ref<boolean>(false)
  const pending = computed((): number => {
    return todos.value.filter((t: Todo) => !t.done).length
  })
  onMounted(() => {
    ready.value = true
  })
  return { title, user, count, todos, serverTags, ready, pending }
</script>
